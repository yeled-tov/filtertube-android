name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # מאפשר הרצה ידנית

# הרשאה ליצור Releases (אחרת מקבלים 403)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt

      - name: Commit error log back to repo on failure
        if: failure()
        run: |
          {
            echo "# Build Error Log"
            echo ""
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo '```'
            grep -E "^e: |error: |FAILED|Unresolved|Caused by|Could not|Duplicate|> Task|What went wrong|Execution failed|No matching variant|Required by" build-output.txt | head -80
            echo '```'
          } > BUILD_ERROR.md
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add BUILD_ERROR.md
          git commit -m "ci: build error log [skip ci]" || true
          git push || true

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/FilterTube-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilterTube-APK
          path: artifacts/FilterTube-debug.apk
          retention-days: 30

      # אם זה push ל-main, גם יוצרים Release אוטומטית
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            APK build אוטומטי מקומיט ${{ github.sha }}.

            **הורד את `FilterTube-debug.apk` למטה והעבר לטלפון.**

            לפרטים על איך להתקין → ראה README.md
          files: artifacts/FilterTube-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
